name: Collect DSE client-type stats

on:
  schedule:
    # 11:00 UTC = 17:00 Asia/Dhaka (5:00 PM, after the 2:20 PM DSE close), every day.
    # The collector self-skips weekends/holidays (snippet date already stored).
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # let the job commit the updated data file

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python snippet_collector.py
      - name: Commit updated data (if changed)
        run: |
          git config user.name "dse-collector"
          git config user.email "actions@users.noreply.github.com"
          git add client_stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: client-type stats update ($(date -u +%F))"
            git push
          fi
